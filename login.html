<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Exam Preparation Portal</title>
</head>
<body>

    <main>

        <section>

            <center>

                <img src="logo.jpeg" alt="Exam Portal Logo" width="200">

                <h1>Exam Preparation Portal</h1>

                <h2>Student Login</h2>

            </center>

            <hr>

            <form action="#">

                <table align="center" cellpadding="8">

                    <tr>
                        <td><label for="username">Username</label></td>
                        <td>
                            <input type="text"
                                   id="username"
                                   name="username"
                                   placeholder="Enter Username"
                                   required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="email">Email</label></td>
                        <td>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="Enter Email"
                                   required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="password">Password</label></td>
                        <td>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   placeholder="Enter Password"
                                   required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="confirm">Confirm Password</label></td>
                        <td>
                            <input type="password"
                                   id="confirm"
                                   name="confirm"
                                   placeholder="Confirm Password"
                                   required>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2">
                            <input type="checkbox"
                                   id="remember"
                                   name="remember">
                            <label for="remember">Remember Me</label>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <input type="submit" value="Login">
                        </td>
                        <td>
                            <input type="reset" value="Reset">
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center">
                            <a href="#">Forgot Password?</a>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center">
                            New User? <a href="#">Register Here</a>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center">
                            <a href="index.html">Back to Home</a>
                        </td>
                    </tr>

                </table>

            </form>

        </section>

    </main>

</body>
</html>
